@if (!userName) {
  <!-- Welcome Screen - Enter Name -->
  <div class="welcome-screen">
    <div class="welcome-card">
      <h1>⚽ World Cup 2026</h1>
      <h2>Prediction League</h2>
      <p>Enter your name to start:</p>

      <form (ngSubmit)="saveName()">
        <input
          type="text"
          [(ngModel)]="nameInput"
          placeholder="Your name"
          class="name-input"
          maxlength="20"
          required
          autofocus
        />
        <button
          type="submit"
          class="btn-start"
          [disabled]="!nameInput || nameInput.trim().length < 2"
        >
          Start Predicting!
        </button>
      </form>
    </div>
  </div>
} @else {
  <router-outlet />
}
